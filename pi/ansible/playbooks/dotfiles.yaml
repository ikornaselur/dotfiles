- hosts: all
  name: Clone dotfiles and create symlinks
  gather_facts: false
  tasks:
    - name: Include common variables
      include_vars: vars/common.yaml

    - name: Ensure dotfiles repo is checked out
      ansible.builtin.git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dest }}"
        update: true
        force: true

    - name: Ensure configs are symlinked
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        force: true
      with_items:
        - {src: "{{ dotfiles_dest }}/zsh/zshrc.raspberrypi", dest: ~/.zshrc}
        - {src: "{{ dotfiles_dest }}/zsh/p10k.zsh", dest: ~/.p10k.zsh}

    - name: Ensure base empty files exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        modification_time: preserve
        access_time: preserve
      with_items:
        - ~/.zshrc.extra
        - ~/.hushlogin
